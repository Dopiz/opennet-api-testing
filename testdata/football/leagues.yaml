test_get_leagues:
  - description: "Get leagues by country code (GB-ENG)"
    code: "GB-ENG"
    expected:
      success: true
      count: 1
      leagues: ["Premier League", "Championship", "League One"]

test_get_league:
  - description: "Get league by id and season (Premier League, 39, 2023)"
    id: 39
    season: 2023
    expected:
      success: true
      count: 1
      name: "Premier League"
      country: "England"
      start: "2023-08-11"
      end: "2024-05-19"
