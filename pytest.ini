[pytest]

testpaths = "tests"

addopts =
    -vv
    -s
    --env="default"
    --alluredir="allure-results"

markers =
    smoke: Quick sanity tests for critical paths
    regression: Full regression test suite
    football: Tests targeting the API-Football (soccer) endpoints
    basketball: Tests targeting the API-Basketball endpoints

log_cli = false
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)s] %(filename)s:%(lineno)d: %(message)s
log_cli_date_format = %H:%M:%S

log_file = artifacts/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

